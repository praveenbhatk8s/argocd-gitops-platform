name: Validate Kubernetes Manifests

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML
        run: |
          sudo apt-get install -y yamllint
          yamllint .

      - name: Kubeval
        uses: instrumenta/kubeval-action@master